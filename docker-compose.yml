version: '3.8'

services:
  web:
    image: caicara-site-image
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - GOOGLE_PLACE_ID=${GOOGLE_PLACE_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.caicara-site.rule=Host(`caicara.store`, `www.caicara.store`)"
      - "traefik.http.routers.caicara-site.entrypoints=websecure"
      - "traefik.http.routers.caicara-site.tls.certresolver=letsencrypt"
      - "traefik.http.services.caicara-site.loadbalancer.server.port=3000"

networks:
  traefik-public:
    external: true
